<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goofy Pro Tennis Flick</title>
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22FlickMaster%22,%22short_name%22:%22Flick%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22}">
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; user-select: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; color: white; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 15px; border: 3px solid #fff; }
        #score-label { color: #00ff00; font-size: 24px; }
        #money-label { color: #ffd700; font-size: 32px; text-shadow: 2px 2px #000; }
        #msg { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 14px; text-align: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hud-top">
            <div class="stat-box">
                <div id="score-label">POINTS: <span id="score">0</span></div>
            </div>
            <div class="stat-box">
                <div id="money-label">$ <span id="money">0</span></div>
            </div>
        </div>
        <div id="msg">WASD/Arrows: Move | Space: Jump | Click: Smash<br>Double-tap screen to jump</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // --- Configuration & State ---
        let score = 0;
        let money = 0;
        const gameObjects = [];
        const CLOTHES_TYPES = ['tshirt', 'pants', 'shorts', 'shoes', 'headcap', 'gloves'];
        const COLORS = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffffff];
        
        // --- Sound Engine (Procedural) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if (type === 'hit') { // Thud
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            } else if (type === 'coin') { // Sparkle
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            } else if (type === 'flick') { // Whoosh
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            }
            osc.start();
            osc.stop(now + 0.4);
        }

        // --- Background Themes ---
        const THEMES = [
            { name: 'Tennis', floor: 0x2e8b57, sky: 0x87ceeb },
            { name: 'Basketball', floor: 0xcd853f, sky: 0x222222 },
            { name: 'Cyber', floor: 0x111111, sky: 0xff00ff },
            { name: 'Desert', floor: 0xedc9af, sky: 0xffa500 },
            { name: 'Ice', floor: 0xe0ffff, sky: 0xadd8e6 },
            { name: 'Lava', floor: 0x330000, sky: 0xff4500 },
            { name: 'Moon', floor: 0x777777, sky: 0x000000 },
            { name: 'Marshmallow', floor: 0xffc0cb, sky: 0xfff0f5 },
            { name: 'Forest', floor: 0x1b4d3e, sky: 0x2e8b57 },
            { name: 'Concrete', floor: 0x808080, sky: 0x696969 },
            { name: 'Clay', floor: 0xd2691e, sky: 0x87ceeb },
            { name: 'Void', floor: 0x000011, sky: 0x000033 }
        ];
        const activeTheme = THEMES[Math.floor(Math.random() * THEMES.length)];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(activeTheme.sky);
        scene.fog = new THREE.Fog(activeTheme.sky, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -20, 0) });

        // --- Lights ---
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: activeTheme.floor });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
        groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
        world.addBody(groundBody);

        // --- Player ---
        class Player {
            constructor() {
                this.materials = {
                    skin: new THREE.MeshStandardMaterial({ color: 0xffdbac }),
                    tshirt: new THREE.MeshStandardMaterial({ color: 0xffffff }),
                    pants: new THREE.MeshStandardMaterial({ color: 0x333333 }),
                    shoes: new THREE.MeshStandardMaterial({ color: 0x111111 }),
                    headcap: new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0 }),
                    gloves: new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
                };

                this.group = new THREE.Group();
                
                // Parts
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), this.materials.skin);
                head.position.y = 2.4;
                
                // Face
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color:0}));
                const eyeL = eye.clone(); eyeL.position.set(-0.15, 0.1, 0.3);
                const eyeR = eye.clone(); eyeR.position.set(0.15, 0.1, 0.3);
                const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.1), new THREE.MeshBasicMaterial({color:0x660000}));
                mouth.position.set(0, -0.15, 0.3);
                head.add(eyeL, eyeR, mouth);

                this.torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), this.materials.tshirt);
                this.torso.position.y = 1.5;

                this.lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), this.materials.pants);
                this.lLeg.position.set(-0.25, 0.5, 0);
                this.rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.35), this.materials.pants);
                this.rLeg.position.set(0.25, 0.5, 0);

                this.racket = new THREE.Group();
                const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.2), new THREE.MeshStandardMaterial({color:0x444}));
                const hoop = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 8, 16), new THREE.MeshStandardMaterial({color:0xff0000}));
                hoop.position.y = 0.8; hoop.rotation.x = Math.PI/2;
                this.racket.add(shaft, hoop);
                this.racket.position.set(0.8, 1.5, 0.4);
                
                this.group.add(head, this.torso, this.lLeg, this.rLeg, this.racket);
                scene.add(this.group);

                this.physBody = new CANNON.Body({
                    mass: 5,
                    shape: new CANNON.Sphere(0.7),
                    position: new CANNON.Vec3(0, 2, 0),
                    fixedRotation: true
                });
                world.addBody(this.physBody);

                this.moveDir = new THREE.Vector3();
                this.canJump = true;
            }

            update(dt) {
                const vel = this.physBody.velocity;
                vel.x = this.moveDir.x * 10;
                vel.z = this.moveDir.z * 10;

                if (this.moveDir.length() > 0.1) {
                    const targetRotation = Math.atan2(this.moveDir.x, this.moveDir.z);
                    this.group.rotation.y = THREE.MathUtils.lerp(this.group.rotation.y, targetRotation, 0.1);
                    
                    const t = Date.now() * 0.01;
                    this.lLeg.rotation.x = Math.sin(t) * 0.8;
                    this.rLeg.rotation.x = -Math.sin(t) * 0.8;
                }

                this.group.position.copy(this.physBody.position);
                this.group.position.y -= 0.7;

                // Ground check for jumping
                this.canJump = Math.abs(this.physBody.velocity.y) < 0.1;
            }

            jump() {
                if (this.canJump) {
                    this.physBody.applyImpulse(new CANNON.Vec3(0, 40, 0), this.physBody.position);
                    playSound('flick');
                }
            }

            swing() {
                playSound('flick');
                this.racket.rotation.x -= 2;
                setTimeout(() => this.racket.rotation.x = 0, 150);
                
                // Hit detection
                gameObjects.forEach(obj => {
                    if (obj.mesh.position.distanceTo(this.group.position) < 3.5) {
                        const dir = obj.mesh.position.clone().sub(this.group.position).normalize();
                        obj.body.applyImpulse(new CANNON.Vec3(dir.x*20, 15, dir.z*20), obj.body.position);
                        if (!obj.scored) {
                            obj.scored = true;
                            if (obj.type === 'poop') updateScore(-3);
                            else if (obj.type === 'flickable') updateScore(1);
                        }
                    }
                });
            }
        }

        const player = new Player();

        // --- Input Handling ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let lastTap = 0;
        window.addEventListener('touchstart', e => {
            const now = Date.now();
            if (now - lastTap < 300) player.jump();
            lastTap = now;
        });

        window.addEventListener('mousedown', () => player.swing());

        // --- Spawner ---
        function createObject() {
            const rand = Math.random();
            let type = 'flickable';
            let color = Math.random() * 0xffffff;
            let shapeType = 'box';
            let size = [0.6, 0.6, 0.6];
            let value = 0;

            if (rand < 0.1) { // Collectibles
                type = 'collectible';
                const cRand = Math.random();
                if (cRand < 0.1) { color = 0x00ffff; value = 100; } // Diamond
                else if (cRand < 0.3) { color = 0xffd700; value = 50; } // Gold
                else if (cRand < 0.6) { color = 0xc0c0c0; value = 20; } // Silver
                else { color = 0xcd7f32; value = 10; } // Copper
                shapeType = 'sphere'; size = [0.3];
            } else if (rand < 0.2) { // Clothes
                type = 'clothing';
                const cType = CLOTHES_TYPES[Math.floor(Math.random() * CLOTHES_TYPES.length)];
                color = COLORS[Math.floor(Math.random() * COLORS.length)];
                type = 'clothing_' + cType;
                size = [0.5, 0.5, 0.5];
            } else if (rand < 0.25) { // Poop
                type = 'poop';
                color = 0x8B4513;
                shapeType = 'sphere'; size = [0.5];
            }

            const geo = shapeType === 'box' ? new THREE.BoxGeometry(...size) : new THREE.SphereGeometry(...size);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: color }));
            mesh.castShadow = true;
            scene.add(mesh);

            const shape = shapeType === 'box' ? new CANNON.Box(new CANNON.Vec3(size[0]/2, size[1]/2, size[2]/2)) : new CANNON.Sphere(size[0]);
            const body = new CANNON.Body({
                mass: 1,
                shape: shape,
                position: new CANNON.Vec3(Math.random()*20-10, 15, Math.random()*20-10)
            });
            
            body.addEventListener('collide', (e) => {
                if (e.contact.bi === groundBody || e.contact.bj === groundBody) playSound('hit');
            });

            world.addBody(body);
            gameObjects.push({ mesh, body, type, color, value, scored: false, time: Date.now() });
        }

        function updateScore(v) {
            score += v;
            document.getElementById('score').innerText = score;
        }

        function updateMoney(v) {
            money += v;
            document.getElementById('money').innerText = money;
            playSound('coin');
        }

        // --- Game Loop ---
        const clock = new THREE.Clock();
        let spawnTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            world.step(1/60);

            // Controls
            player.moveDir.set(0,0,0);
            if (keys['KeyW'] || keys['ArrowUp']) player.moveDir.z = -1;
            if (keys['KeyS'] || keys['ArrowDown']) player.moveDir.z = 1;
            if (keys['KeyA'] || keys['ArrowLeft']) player.moveDir.x = -1;
            if (keys['KeyD'] || keys['ArrowRight']) player.moveDir.x = 1;
            if (keys['Space']) player.jump();
            
            player.update(dt);

            // Spawning
            spawnTimer += dt;
            if (spawnTimer > 1.0) {
                createObject();
                spawnTimer = 0;
            }

            // Object Logic
            for (let i = gameObjects.length - 1; i >= 0; i--) {
                const obj = gameObjects[i];
                obj.mesh.position.copy(obj.body.position);
                obj.mesh.quaternion.copy(obj.body.quaternion);

                // Player Collision
                const d = obj.mesh.position.distanceTo(player.group.position);
                if (d < 1.5) {
                    if (obj.type === 'collectible') {
                        updateMoney(obj.value);
                        removeObj(obj, i);
                        continue;
                    } else if (obj.type.startsWith('clothing_')) {
                        const part = obj.type.split('_')[1];
                        player.materials[part].color.set(obj.color);
                        player.materials[part].opacity = 1;
                        removeObj(obj, i);
                        continue;
                    }
                }

                // Cleanup (2 mins)
                if (Date.now() - obj.time > 120000 || obj.body.position.y < -10) {
                    removeObj(obj, i);
                }
            }

            renderer.render(scene, camera);
        }

        function removeObj(obj, index) {
            scene.remove(obj.mesh);
            world.removeBody(obj.body);
            gameObjects.splice(index, 1);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
